<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - SimplyJudge</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen font-sans antialiased flex flex-col items-center justify-center p-4">
    
    <div class="max-w-md w-full bg-gray-900 border border-gray-800 rounded-3xl p-8 shadow-2xl relative">
        
        <div class="flex flex-col items-center mb-8 border-b border-gray-800 pb-6">
            <div class="w-12 h-12 bg-indigo-600 rounded-xl flex items-center justify-center font-black text-white text-xl shadow-lg shadow-indigo-900/50 mb-4">
                S
            </div>
            <h1 class="text-2xl font-black text-white tracking-wide">SimplyJudge</h1>
            <p class="text-xs text-gray-400 mt-1 font-mono uppercase tracking-wider">Secure Access Portal</p>
        </div>

        {% if form.errors %}
            <div class="mb-6 p-4 rounded-xl text-xs font-bold bg-red-950/40 text-red-400 border border-red-900/50 text-center">
                ⚠️ Invalid username or password. Please try again.
            </div>
        {% endif %}

        <form method="post" action="{% url 'login' %}" class="space-y-5">
            {% csrf_token %}
            
            <div>
                <label for="id_username" class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-1.5">Username</label>
                <input type="text" name="username" id="id_username" required class="w-full bg-gray-950 border border-gray-800 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 rounded-xl p-3 text-sm text-white outline-none transition-all placeholder-gray-700" placeholder="Enter your username">
            </div>
            
            <div>
                <label for="id_password" class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-1.5">Password</label>
                <input type="password" name="password" id="id_password" required class="w-full bg-gray-950 border border-gray-800 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 rounded-xl p-3 text-sm text-white outline-none transition-all placeholder-gray-700" placeholder="••••••••">
            </div>

            <input type="hidden" name="next" value="{{ next }}">

            <div class="pt-4 mt-2">
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 px-4 rounded-xl text-xs uppercase tracking-widest transition-all shadow-lg active:scale-[0.99]">
                    Secure Log In
                </button>
            </div>
        </form>

        <div class="mt-8 text-center border-t border-gray-800 pt-6">
            <a href="{% url 'home_hub' %}" class="text-[11px] text-gray-500 hover:text-gray-300 font-bold uppercase tracking-wider transition-colors">
                ← Return to Public Dashboard
            </a>
        </div>

    </div>

</body>
</html>
