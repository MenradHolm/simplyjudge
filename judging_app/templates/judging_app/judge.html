<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simply Judge - Evaluating</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans">

    <div class="flex flex-col lg:flex-row min-h-screen">
        
        <div class="w-full lg:w-2/3 flex flex-col p-4 bg-black min-h-[50vh] lg:min-h-screen justify-center items-center relative">
            <div class="absolute top-4 left-4 text-gray-400 text-sm font-semibold bg-gray-900/80 px-3 py-1 rounded-lg">
                Photo {{ progress }}
            </div>
            
            <img src="{{ photo.image.url }}" alt="{{ photo.title }}" class="max-w-full max-h-[60vh] lg:max-h-[90vh] object-contain rounded shadow-2xl">
        </div>

        <div class="w-full lg:w-1/3 bg-gray-800 border-l border-gray-700 flex flex-col shadow-xl z-20">
            <div class="p-6 border-b border-gray-700">
                <h3 class="text-xl font-bold text-white mb-1">{{ photo.title }}</h3>
                <p class="text-sm text-gray-400">By {{ photo.photographer_name }} | {{ photo.category }}</p>
            </div>
            
            <form action="{% url 'judge_photo' competition.id photo.id %}" method="POST" class="flex-1 flex flex-col overflow-hidden">
                {% csrf_token %}
                
                <div class="flex-1 overflow-y-auto p-6 space-y-6">
                    {% if rubric %}
                        {% for criterion in rubric %}
                        <div>
                            <label class="flex justify-between text-sm font-medium text-gray-300 mb-2">
                                <span>{{ criterion.name }}</span>
                                <span class="text-indigo-400">Max: {{ criterion.max_points }}</span>
                            </label>
                            <input type="number" name="criterion_{{ criterion.id }}" min="0" max="{{ criterion.max_points }}" step="0.1" required class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors">
                        </div>
                        {% endfor %}
                    {% else %}
                        <p class="text-red-400 text-sm">No rubric criteria found for this competition!</p>
                    {% endif %}
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">Optional Comments</label>
                        <textarea name="comment" rows="3" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors"></textarea>
                    </div>
                </div>

                <div class="p-6 bg-gray-800 border-t border-gray-700">
                    <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-lg transition-colors shadow-lg">
                        Submit Scores
                    </button>
                </div>
            </form>
        </div>

    </div>
</body>
</html>
