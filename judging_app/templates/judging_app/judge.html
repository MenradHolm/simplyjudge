<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimplyJudge - Judging Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 h-screen flex flex-col overflow-hidden font-sans">

    <header class="flex-none flex items-center justify-between px-6 py-4 bg-gray-800 border-b border-gray-700 shadow-sm z-10">
        <div class="flex items-center space-x-3">
            <h1 class="text-xl font-bold tracking-tight text-white">SimplyJudge</h1>
        </div>
        <div class="flex items-center space-x-4">
            <span class="text-sm font-medium text-indigo-400">Photo {{ progress }}</span>
            <a href="/admin" class="px-4 py-1.5 text-sm font-medium rounded-md text-gray-300 hover:text-white hover:bg-gray-700 transition-colors">
                Admin Dashboard
            </a>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        
        <div class="flex-1 overflow-y-auto bg-black p-8 relative flex flex-col items-center justify-center">
            <div class="absolute top-6 left-6 z-10 bg-black/60 backdrop-blur-md px-4 py-2 rounded-lg border border-gray-700">
                <h2 class="text-xl font-semibold text-white">{{ photo.title }}</h2>       
            </div>
            
            <img src="{{ photo.image.url }}" alt="{{ photo.title }}" class="max-h-full max-w-full object-contain rounded shadow-2xl">
        </div>

        <div class="w-96 bg-gray-800 border-l border-gray-700 flex flex-col shadow-xl z-20">
            <div class="p-6 border-b border-gray-700">
                <h3 class="text-lg font-semibold text-white">Scoring Rubric</h3>
                <p class="text-sm text-gray-400">Evaluate the current photo.</p>
            </div>
            
            <form action="{% url 'judge_photo' competition.id photo.id %}" method="POST" class="flex-1 flex flex-col overflow-hidden">
                {% csrf_token %} 
                
                <div class="flex-1 overflow-y-auto p-6 space-y-6">
                    {% if rubric %}
                        {% for criterion in rubric %}
                            <div class="space-y-2">
                                <div class="flex justify-between items-end">
                                    <label class="text-sm font-medium text-gray-200">
                                        {{ criterion.name }}
                                    </label>
                                    <span class="text-xs text-gray-400">Max: {{ criterion.max_points|floatformat:0 }} pts</span>
                                </div>
                                <input 
                                    type="number" 
                                    name="criterion_{{ criterion.id }}"
                                    min="0" 
                                    max="{{ criterion.max_points }}"
                                    step="0.5"
                                    required
                                    class="w-full px-4 py-2 border border-gray-600 rounded-md bg-gray-700 text-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-shadow"
                                    placeholder="Enter score..."
                                />
                            </div>
                        {% endfor %}
                        
                        <div class="space-y-2 pt-4 border-t border-gray-700">
                            <label class="text-sm font-medium text-gray-200">Private Comments</label>
                            <textarea 
                                name="comment"
                                rows="4"
                                class="w-full px-4 py-2 border border-gray-600 rounded-md bg-gray-700 text-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-shadow resize-none"
                                placeholder="Constructive feedback..."></textarea>
                        </div>
                    {% else %}
                        <div class="text-center text-gray-500 py-8">Rubric not loaded.</div>
                    {% endif %}
                </div>

                <div class="p-6 bg-gray-850 border-t border-gray-700">
                    <button type="submit" class="w-full flex items-center justify-center space-x-2 bg-indigo-600 hover:bg-indigo-700 text-white py-3 px-4 rounded-lg font-medium transition-colors">
                        Save & Next Photo
                    </button>
                </div>
            </form>
        </div>
    </main>
</body>
</html>
