<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit to Simply Judge</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex items-center justify-center font-sans p-6">

    <div class="max-w-xl w-full bg-gray-800 border border-gray-700 rounded-xl shadow-2xl p-8">
        <h1 class="text-3xl font-bold text-white mb-2">Submit Your Photo</h1>
        <p class="text-gray-400 mb-8">Enter your competition submission below.</p>

        <form action="{% url 'submit_photo' %}" method="POST" enctype="multipart/form-data" class="space-y-6">
            {% csrf_token %}
            
            <div class="space-y-2">
                <label class="text-sm font-medium text-gray-200">Photo Title</label>
                <input type="text" name="title" required class="w-full px-4 py-3 border border-gray-600 rounded-md bg-gray-700 text-white focus:ring-2 focus:ring-indigo-500">
            </div>

            <div class="space-y-2">
                <label class="text-sm font-medium text-gray-200">Photographer Name</label>
                <input type="text" name="photographer_name" required class="w-full px-4 py-3 border border-gray-600 rounded-md bg-gray-700 text-white focus:ring-2 focus:ring-indigo-500">
            </div>

            <div class="space-y-2">
                <label class="text-sm font-medium text-gray-200">Category</label>
                <select name="category" required class="w-full px-4 py-3 border border-gray-600 rounded-md bg-gray-700 text-white focus:ring-2 focus:ring-indigo-500">
                    <option value="" disabled selected>-- Select a category --</option>
                    <option value="Landscape">Landscape</option>
                    <option value="Portrait">Portrait</option>
                    <option value="Abstract">Abstract</option>
                    <option value="Wildlife">Wildlife</option>
                </select>
            </div>

            <div class="space-y-2">
                <label class="text-sm font-medium text-gray-200">Upload Image</label>
                <input type="file" name="image" accept="image/*" required class="w-full px-4 py-3 border border-gray-600 rounded-md bg-gray-700 text-white focus:ring-2 focus:ring-indigo-500">
            </div>

            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3 px-4 rounded-lg font-bold transition-colors mt-4">
                Submit Photo
            </button>
        </form>
    </div>

</body>
</html>
