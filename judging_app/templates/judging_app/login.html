<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Simply Judge</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 flex items-center justify-center min-h-screen font-sans p-6">
    <div class="bg-gray-800 p-8 rounded-xl shadow-2xl max-w-md w-full border border-gray-700">
        <h2 class="text-2xl font-bold text-white mb-6">Welcome Back</h2>
        
        {% if form.errors %}
            <p class="text-red-400 text-sm mb-4">Your username and password didn't match. Please try again.</p>
        {% endif %}

        <form method="POST" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-gray-300 text-sm font-medium mb-1">Username</label>
                <input type="text" name="username" class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white">
            </div>
            <div>
                <label class="block text-gray-300 text-sm font-medium mb-1">Password</label>
                <input type="password" name="password" class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white">
            </div>
            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded">Log In</button>
        </form>
        <p class="text-center text-gray-400 mt-4 text-sm">Need an account? <a href="/register/" class="text-indigo-400">Sign up</a></p>
    </div>
</body>
</html>
