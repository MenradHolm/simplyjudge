{% extends "admin/base.html" %}

{% block title %}{% if subtitle %}{{ subtitle }} | {% endif %}{{ title }} | SimplyJudge Admin{% endblock %}

{% block branding %}
<div id="site-name">
    <a href="{% url 'admin:index' %}">
        <span class="sj-admin-mark">S</span>
        <span>
            <strong>SimplyJudge</strong>
            <small>Organizer Console</small>
        </span>
    </a>
</div>
{% endblock %}

{% block extrastyle %}{{ block.super }}
<style>
    :root {
        --primary: #39c6f4;
        --secondary: #0f766e;
        --accent: #16a34a;
        --primary-fg: #ffffff;
        --body-bg: #101318;
        --body-fg: #f8fafc;
        --body-quiet-color: #b9c6d8;
        --body-loud-color: #ffffff;
        --header-color: #ffffff;
        --header-branding-color: #ffffff;
        --header-bg: #18212f;
        --header-link-color: #ffffff;
        --breadcrumbs-bg: #151a22;
        --breadcrumbs-fg: #b9c6d8;
        --breadcrumbs-link-fg: #39c6f4;
        --link-fg: #39c6f4;
        --link-hover-color: #7dd3fc;
        --link-selected-fg: #7dd3fc;
        --hairline-color: #303844;
        --border-color: #303844;
        --error-fg: #ff4f83;
        --message-success-bg: #0f2f29;
        --message-warning-bg: #382a12;
        --message-error-bg: #3a1621;
        --darkened-bg: #151a22;
        --selected-bg: #102a2b;
        --selected-row: #1f2937;
        --button-fg: #ffffff;
        --button-bg: #2557a7;
        --button-hover-bg: #356fc4;
        --default-button-bg: #138a72;
        --default-button-hover-bg: #16a085;
        --close-button-bg: #455166;
        --close-button-hover-bg: #697386;
        color-scheme: dark;
    }

    body {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
            linear-gradient(135deg, rgba(37, 87, 167, 0.16), transparent 34rem),
            linear-gradient(315deg, rgba(19, 138, 114, 0.16), transparent 30rem),
            var(--body-bg);
    }

    #header {
        min-height: 4.25rem;
        padding-inline: clamp(1rem, 4vw, 2rem);
        background: rgba(24, 33, 47, 0.96);
        box-shadow: 0 12px 30px rgba(25, 36, 54, 0.18);
    }

    #site-name a {
        display: inline-flex;
        align-items: center;
        gap: 0.75rem;
        color: #fff;
        text-decoration: none;
    }

    #site-name strong {
        display: block;
        font-size: 1rem;
        line-height: 1.1;
    }

    #site-name small {
        display: block;
        color: #b9c6d8;
        font-size: 0.68rem;
        font-weight: 750;
        letter-spacing: 0.08em;
        text-transform: uppercase;
    }

    .sj-admin-mark {
        width: 2.35rem;
        height: 2.35rem;
        display: grid;
        place-items: center;
        border-radius: 0.65rem;
        color: #fff;
        font-weight: 850;
        background: linear-gradient(135deg, #2557a7, #0f766e);
        box-shadow: 0 10px 25px rgba(37, 87, 167, 0.24);
    }

    div.breadcrumbs {
        padding: 0.8rem clamp(1rem, 4vw, 2rem);
        border-bottom: 1px solid var(--hairline-color);
        background: rgba(21, 26, 34, 0.92);
        color: var(--body-quiet-color);
    }

    #content {
        width: min(1160px, calc(100% - 2rem));
        max-width: none;
        margin: 0;
        padding: clamp(1rem, 3vw, 2rem) 0 2rem clamp(1rem, 3vw, 2rem);
    }

    .dashboard #content {
        width: min(1160px, calc(100vw - 4rem)) !important;
        max-width: none !important;
        display: grid;
        grid-template-columns: minmax(0, 750px) 325px;
        gap: 1.5rem;
        align-items: start;
    }

    .dashboard #content h1 {
        grid-column: 1 / -1;
        margin: 0 0 0.25rem;
        color: #f8fafc;
        font-weight: 500;
    }

    .dashboard #content-main,
    .dashboard #content-related {
        float: none;
        width: auto !important;
        margin: 0 !important;
    }

    #content-main,
    .module,
    .inline-group,
    #changelist,
    .submit-row {
        border: 1px solid var(--hairline-color);
        border-radius: 0.5rem;
        background: #151515;
        box-shadow: 0 18px 38px rgba(0, 0, 0, 0.22);
        overflow: hidden;
    }

    #content-main {
        box-shadow: none;
        background: transparent;
        border: 0;
    }

    #content-related {
        border: 1px solid var(--hairline-color);
        border-radius: 0.5rem;
        background: #202020;
        box-shadow: 0 18px 38px rgba(0, 0, 0, 0.22);
        overflow: hidden;
    }

    #content-related .module {
        border: 0;
        border-radius: 0;
        box-shadow: none;
        background: transparent;
    }

    .module h2,
    .module caption,
    .inline-group h2 {
        padding: 0.85rem 1rem;
        background: #20242c;
        color: #f8fafc;
        font-size: 0.82rem;
        font-weight: 850;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        border-bottom: 1px solid var(--hairline-color);
    }

    .module table {
        background: #151515;
    }

    .module table th,
    .module table td,
    #changelist table tbody th,
    #changelist table tbody td {
        border-bottom-color: #252a33;
    }

    .module table tr:nth-child(even),
    .row2 {
        background: #202020;
    }

    .dashboard .module table th,
    .dashboard .module table td,
    #changelist table tbody th,
    #changelist table tbody td {
        padding-block: 0.8rem;
    }

    .dashboard .module {
        margin-bottom: 1.25rem;
    }

    #changelist-filter {
        border-left: 1px solid var(--hairline-color);
        background: #20242c;
    }

    #toolbar,
    #changelist .actions {
        border-bottom: 1px solid var(--hairline-color);
        background: #20242c;
    }

    input,
    textarea,
    select,
    .vTextField {
        border-radius: 0.5rem;
        border-color: var(--border-color);
        background: #101318;
        color: #f8fafc;
    }

    input:focus,
    textarea:focus,
    select:focus,
    .vTextField:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(37, 87, 167, 0.12);
    }

    .button,
    input[type=submit],
    input[type=button],
    .submit-row input,
    a.button {
        border-radius: 0.5rem;
        font-weight: 850;
    }

    .object-tools a,
    .object-tools button {
        border-radius: 0.5rem;
        background: var(--accent);
        font-weight: 850;
    }

    .object-tools a:hover,
    .object-tools button:hover {
        background: #0f766e;
    }

    .messagelist li {
        border-radius: 0.5rem;
        border: 1px solid var(--hairline-color);
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.18);
    }

    @media (max-width: 980px) {
        #content {
            width: auto;
            margin: 0;
            padding-inline: 1rem;
        }

        .dashboard #content {
            grid-template-columns: 1fr;
        }
    }

    @media (max-width: 767px) {
        #header {
            align-items: flex-start;
            padding-block: 0.8rem;
        }

        #content {
            padding-inline: 0.75rem;
        }
    }
</style>
{% endblock %}
