{% extends "admin/base.html" %}

{% block title %}{% if subtitle %}{{ subtitle }} | {% endif %}{{ title }} | SimplyJudge Admin{% endblock %}

{% block branding %}
<div id="site-name">
    <a href="{% url 'admin:index' %}">
        <span class="sj-admin-mark">S</span>
        <span>
            <strong>SimplyJudge</strong>
            <small>Organizer Console</small>
        </span>
    </a>
</div>
{% endblock %}

{% block extrastyle %}{{ block.super }}
<style>
    :root {
        --primary: #2557a7;
        --secondary: #173f7e;
        --accent: #138a72;
        --primary-fg: #ffffff;
        --body-bg: #f8fafc;
        --body-fg: #18212f;
        --body-quiet-color: #697386;
        --body-loud-color: #18212f;
        --header-color: #ffffff;
        --header-branding-color: #ffffff;
        --header-bg: #18212f;
        --header-link-color: #ffffff;
        --breadcrumbs-bg: #ffffff;
        --breadcrumbs-fg: #697386;
        --breadcrumbs-link-fg: #2557a7;
        --link-fg: #2557a7;
        --link-hover-color: #173f7e;
        --link-selected-fg: #173f7e;
        --hairline-color: #d9e1ec;
        --border-color: #d9e1ec;
        --error-fg: #b42318;
        --message-success-bg: #e7f6f2;
        --message-warning-bg: #fff7e6;
        --message-error-bg: #fff1f0;
        --darkened-bg: #eef3f9;
        --selected-bg: #e7f6f2;
        --selected-row: #f5f7fb;
        --button-fg: #ffffff;
        --button-bg: #2557a7;
        --button-hover-bg: #173f7e;
        --default-button-bg: #138a72;
        --default-button-hover-bg: #0f766e;
        --close-button-bg: #697386;
        --close-button-hover-bg: #455166;
        color-scheme: light;
    }

    body {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
            linear-gradient(135deg, rgba(37, 87, 167, 0.08), transparent 34rem),
            linear-gradient(315deg, rgba(19, 138, 114, 0.08), transparent 30rem),
            var(--body-bg);
    }

    #header {
        min-height: 4.25rem;
        padding-inline: clamp(1rem, 4vw, 2rem);
        background: rgba(24, 33, 47, 0.96);
        box-shadow: 0 12px 30px rgba(25, 36, 54, 0.18);
    }

    #site-name a {
        display: inline-flex;
        align-items: center;
        gap: 0.75rem;
        color: #fff;
        text-decoration: none;
    }

    #site-name strong {
        display: block;
        font-size: 1rem;
        line-height: 1.1;
    }

    #site-name small {
        display: block;
        color: #b9c6d8;
        font-size: 0.68rem;
        font-weight: 750;
        letter-spacing: 0.08em;
        text-transform: uppercase;
    }

    .sj-admin-mark {
        width: 2.35rem;
        height: 2.35rem;
        display: grid;
        place-items: center;
        border-radius: 0.65rem;
        color: #fff;
        font-weight: 850;
        background: linear-gradient(135deg, #2557a7, #0f766e);
        box-shadow: 0 10px 25px rgba(37, 87, 167, 0.24);
    }

    div.breadcrumbs {
        padding: 0.8rem clamp(1rem, 4vw, 2rem);
        border-bottom: 1px solid var(--hairline-color);
        background: rgba(255, 255, 255, 0.86);
        color: var(--body-quiet-color);
    }

    #content {
        padding: clamp(1rem, 4vw, 2rem);
    }

    #content-main,
    .module,
    .inline-group,
    #changelist,
    .submit-row {
        border: 1px solid var(--hairline-color);
        border-radius: 0.5rem;
        background: #fff;
        box-shadow: 0 14px 32px rgba(25, 36, 54, 0.08);
        overflow: hidden;
    }

    .module h2,
    .module caption,
    .inline-group h2 {
        padding: 0.85rem 1rem;
        background: #fbfcfe;
        color: var(--body-fg);
        font-size: 0.82rem;
        font-weight: 850;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        border-bottom: 1px solid var(--hairline-color);
    }

    .dashboard .module table th,
    .dashboard .module table td,
    #changelist table tbody th,
    #changelist table tbody td {
        padding-block: 0.8rem;
    }

    #changelist-filter {
        border-left: 1px solid var(--hairline-color);
        background: #fbfcfe;
    }

    #toolbar,
    #changelist .actions {
        border-bottom: 1px solid var(--hairline-color);
        background: #fbfcfe;
    }

    input,
    textarea,
    select,
    .vTextField {
        border-radius: 0.5rem;
        border-color: var(--border-color);
    }

    input:focus,
    textarea:focus,
    select:focus,
    .vTextField:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(37, 87, 167, 0.12);
    }

    .button,
    input[type=submit],
    input[type=button],
    .submit-row input,
    a.button {
        border-radius: 0.5rem;
        font-weight: 850;
    }

    .object-tools a,
    .object-tools button {
        border-radius: 0.5rem;
        background: var(--accent);
        font-weight: 850;
    }

    .object-tools a:hover,
    .object-tools button:hover {
        background: #0f766e;
    }

    .messagelist li {
        border-radius: 0.5rem;
        border: 1px solid var(--hairline-color);
        box-shadow: 0 10px 24px rgba(25, 36, 54, 0.08);
    }

    @media (max-width: 767px) {
        #header {
            align-items: flex-start;
            padding-block: 0.8rem;
        }

        #content {
            padding-inline: 0.75rem;
        }
    }
</style>
{% endblock %}
